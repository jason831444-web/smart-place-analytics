services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart
      POSTGRES_DB: smart_place
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart -d smart_place"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements-ml.txt}
    environment:
      DATABASE_URL: postgresql+psycopg://smart:smart@db:5432/smart_place
      SECRET_KEY: local-development-secret
      CORS_ORIGINS: '["http://localhost:3000"]'
      PUBLIC_BASE_URL: http://localhost:8000
      STORAGE_DIR: storage
      CV_BACKEND: ${CV_BACKEND:-yolo}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      YOLO_CONFIDENCE_THRESHOLD: ${YOLO_CONFIDENCE_THRESHOLD:-0.25}
      YOLO_DEVICE: ${YOLO_DEVICE:-cpu}
      YOLO_FALLBACK_TO_MOCK: ${YOLO_FALLBACK_TO_MOCK:-false}
      LIVE_PERSIST_INTERVAL_SECONDS: ${LIVE_PERSIST_INTERVAL_SECONDS:-60}
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: admin12345
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      INTERNAL_API_BASE_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: