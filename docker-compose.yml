services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart
      POSTGRES_DB: smart_place
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart -d smart_place"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements.txt}
    environment:
      DATABASE_URL: postgresql+psycopg://smart:smart@db:5432/smart_place
      SECRET_KEY: local-development-secret
      CORS_ORIGINS: '["http://localhost:3000"]'
      PUBLIC_BASE_URL: http://localhost:8000
      STORAGE_DIR: storage
      CV_BACKEND: ${CV_BACKEND:-mock}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      YOLO_CONFIDENCE_THRESHOLD: ${YOLO_CONFIDENCE_THRESHOLD:-0.25}
      YOLO_DEVICE: ${YOLO_DEVICE:-}
      YOLO_FALLBACK_TO_MOCK: ${YOLO_FALLBACK_TO_MOCK:-true}
      LIVE_PERSIST_INTERVAL_SECONDS: ${LIVE_PERSIST_INTERVAL_SECONDS:-60}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      MAX_LIVE_FRAME_BYTES: ${MAX_LIVE_FRAME_BYTES:-5242880}
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: admin12345
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      INTERNAL_API_BASE_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  sensor-simulator:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements.txt}
    profiles: ["simulator"]
    environment:
      DATABASE_URL: postgresql+psycopg://smart:smart@db:5432/smart_place
      SECRET_KEY: local-development-secret
      STORAGE_DIR: storage
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    command: python scripts/simulate_sensor_stream.py --interval-seconds 5 --iterations 0

  operations-jobs:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements.txt}
    profiles: ["operations"]
    environment:
      DATABASE_URL: postgresql+psycopg://smart:smart@db:5432/smart_place
      SECRET_KEY: local-development-secret
      STORAGE_DIR: storage
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    command: python scripts/run_operations_jobs.py --interval-seconds 30 --iterations 0 --generate-sensors --compute-rollups

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    profiles: ["mqtt"]
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mqtt-subscriber:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements.txt}
    profiles: ["mqtt"]
    environment:
      DATABASE_URL: postgresql+psycopg://smart:smart@db:5432/smart_place
      SECRET_KEY: local-development-secret
      STORAGE_DIR: storage
    depends_on:
      db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    command: python scripts/subscribe_sensor_mqtt.py --host mqtt-broker --port 1883

  mqtt-publisher:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements.txt}
    profiles: ["mqtt"]
    environment:
      DATABASE_URL: postgresql+psycopg://smart:smart@db:5432/smart_place
      SECRET_KEY: local-development-secret
      STORAGE_DIR: storage
    depends_on:
      db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      mqtt-subscriber:
        condition: service_started
    command: python scripts/publish_sensor_mqtt.py --host mqtt-broker --port 1883 --facility-id 1 --interval-seconds 5 --iterations 0

volumes:
  postgres_data:
